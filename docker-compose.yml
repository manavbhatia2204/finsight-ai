services:

  postgres:
    image: postgres:17

    container_name: finsight-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  finsight-api:
    build: .

    container_name: finsight-api

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./agents/ml_prediction_agent/model_store:/app/agents/ml_prediction_agent/model_store
      - ./rag/vector_store:/app/rag/vector_store

volumes:
  postgres_data: